services:
  db-clone-cli:
    container_name: db_clone_cli
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - "./app:/app"
    working_dir: /app
    depends_on:
      - db-clone-cli-db
    environment:
      - DB_USER=root
      - DB_PASSWORD=dbclonestrongpass
      - DB_HOST=db-clone-cli-db
      - DB_NAME=db_clone
  db-clone-cli-db:
    container_name: db_clone_cli_db
    image: mysql:9.7.1
    user: "1000:1000"
    volumes:
      - "./data:/var/lib/mysql"
    environment:
      - MYSQL_ROOT_PASSWORD=dbclonestrongpass
    ports:
      - "3911:3306"
